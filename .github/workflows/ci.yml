name: TransitTrack CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: transit-track-backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: transit_track_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_USERNAME: test_user
      DB_PASSWORD: test_pass
      DB_NAME: transit_track_test
      DB_HOST: localhost
      DB_PORT: 5432
      JWT_SECRET: test_jwt_secret
      FRONTEND_ORIGIN: http://localhost:19006

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: transit-track-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run migrations
        run: npx sequelize-cli db:migrate --env test

      - name: Seed test data
        run: npx sequelize-cli db:seed:all --env test

      - name: Smoke test
        run: npm run smoke

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: transit-track-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: transit-track-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Smoke test
        run: npm run smoke
